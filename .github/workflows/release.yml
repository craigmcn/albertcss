name: Release to GitHub Pages

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Exact tag name as it exists in Git (e.g. 0.13.0 for old tags, v0.14.0 for new ones). The "v" prefix is added to the URL path if not present, but the tag must match Git exactly.'
        required: true

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Resolve tag and version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            [[ "$TAG" == v* ]] && VERSION="$TAG" || VERSION="v$TAG"
          else
            TAG="${GITHUB_REF#refs/tags/}"
            VERSION="$TAG"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.tag }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Compute SRI hashes
        id: sri
        run: |
          CSS_SRI="sha384-$(openssl dgst -sha384 -binary dist/css/albert.min.css | openssl base64 -A)"
          JS_SRI="sha384-$(openssl dgst -sha384 -binary dist/js/albert.min.js | openssl base64 -A)"
          echo "css=$CSS_SRI" >> "$GITHUB_OUTPUT"
          echo "js=$JS_SRI" >> "$GITHUB_OUTPUT"

      - name: Deploy to GitHub Pages
        # Pinned to @v4 (not a commit SHA) — this is a personal project with
        # no external contributors, so the maintenance cost of SHA pinning
        # outweighs the supply-chain benefit.
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          destination_dir: ${{ steps.version.outputs.version }}
          keep_files: true

      - name: Update versions index
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE="$(date -u +%Y-%m-%d)"
          BASE_URL="https://albertcss.craigmcn.com"
          REPO="${{ github.repository }}"

          # Build the new entry
          NEW_ENTRY=$(jq -nc \
            --arg version  "$VERSION" \
            --arg date     "$DATE" \
            --arg css_url  "${BASE_URL}/${VERSION}/css/albert.min.css" \
            --arg css_sri  "${{ steps.sri.outputs.css }}" \
            --arg js_url   "${BASE_URL}/${VERSION}/js/albert.min.js" \
            --arg js_sri   "${{ steps.sri.outputs.js }}" \
            '{version:$version,date:$date,css:{url:$css_url,integrity:$css_sri},js:{url:$js_url,integrity:$js_sri}}')

          # Read existing versions.json from gh-pages.
          # Use if/else so a 404 body written to stdout by `gh api` on failure
          # never gets mixed with the fallback value.
          if EXISTING_RESPONSE=$(gh api "repos/${REPO}/contents/versions.json?ref=gh-pages" 2>/dev/null); then
            EXISTING_SHA=$(echo "$EXISTING_RESPONSE" | jq -r '.sha')
            # Extract the raw base64 string; check for emptiness before decoding.
            # jq '.' of empty input exits 0 on Linux, so a pipeline `|| echo '[]'`
            # fallback would never fire — check the b64 string directly instead.
            CONTENT_B64=$(echo "$EXISTING_RESPONSE" | jq -r '.content' | tr -d '\n')
            if [ -n "$CONTENT_B64" ]; then
              EXISTING_CONTENT=$(printf '%s' "$CONTENT_B64" | base64 -d | jq '.' 2>/dev/null || echo '[]')
            else
              EXISTING_CONTENT='[]'
            fi
          else
            EXISTING_SHA=''
            EXISTING_CONTENT='[]'
          fi

          # Prepend new entry (dedup by version in case of re-run)
          UPDATED=$(echo "$EXISTING_CONTENT" | jq \
            --argjson e "$NEW_ENTRY" \
            '[$e] + map(select(.version != $e.version))')
          if [ -z "$UPDATED" ]; then
            echo "Error: failed to build updated versions array" >&2
            exit 1
          fi
          CONTENT_B64=$(printf '%s' "$UPDATED" | base64 -w 0)

          # Upsert versions.json on gh-pages
          if [ -n "$EXISTING_SHA" ]; then
            gh api "repos/${REPO}/contents/versions.json" -X PUT \
              -f message="chore: update versions index for ${VERSION}" \
              -f content="$CONTENT_B64" \
              -f sha="$EXISTING_SHA" \
              -f branch=gh-pages
          else
            gh api "repos/${REPO}/contents/versions.json" -X PUT \
              -f message="chore: create versions index" \
              -f content="$CONTENT_B64" \
              -f branch=gh-pages
          fi

          # Upsert versions.html — always read from the default branch so
          # re-runs against old tags (which predate versions.html) still work.
          HTML_SHA=$(gh api "repos/${REPO}/contents/versions.html?ref=gh-pages" \
            --jq '.sha' 2>/dev/null || echo '')
          HTML_B64=$(gh api "repos/${REPO}/contents/versions.html" \
            --jq '.content' | tr -d '\n')
          if [ -n "$HTML_SHA" ]; then
            gh api "repos/${REPO}/contents/versions.html" -X PUT \
              -f message="chore: update versions page" \
              -f content="$HTML_B64" \
              -f sha="$HTML_SHA" \
              -f branch=gh-pages
          else
            gh api "repos/${REPO}/contents/versions.html" -X PUT \
              -f message="chore: add versions page" \
              -f content="$HTML_B64" \
              -f branch=gh-pages
          fi
